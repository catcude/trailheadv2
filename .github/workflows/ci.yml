name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (TS strict, no any)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Design tokens only (no raw hex in components)
        run: node scripts/check-tokens.mjs

      - name: Build
        run: pnpm build

  e2e:
    # No-auth interactive-hero E2E (WS8). Builds + serves the app and drives
    # Chromium. Authed flows run against a preview (see m2-for-cat.md).
    name: E2E (interactive hero)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm exec playwright test

  rls:
    name: Migrations + RLS policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Start local Supabase (applies migrations)
        run: supabase start

      - name: Run RLS policy tests
        run: |
          eval "$(supabase status -o env | sed 's/^/export /')"
          export SUPABASE_TEST_URL="$API_URL"
          export SUPABASE_TEST_ANON_KEY="$ANON_KEY"
          export SUPABASE_TEST_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          pnpm vitest run tests/rls

  tone-judge:
    # PRD §8 LLM tone judge — REPORT-ONLY (non-blocking). The deterministic
    # voice-lint runs inside the blocking `checks` job (pnpm test); this job
    # adds the subjective LLM judge. It self-skips when LLM_API_KEY is absent,
    # so forks and secret-less runs pass trivially.
    #
    # Path filter: only meaningful when the prompt layer or tone data changes.
    # Promotion to blocking: once this has run green across ≥20 consecutive
    # main builds with no prompt-driven false negatives, move the step into
    # the `checks` job and drop continue-on-error.
    name: Tone judge (report)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tone judge (skips without a key)
        env:
          LLM_PROVIDER: anthropic
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: pnpm vitest run tests/evals/tone-judge.test.ts

  audit:
    name: Dependency audit (report)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high
